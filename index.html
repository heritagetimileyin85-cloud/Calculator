<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">


    <!-- 1. 2 input 
     2. Four Operators (+,-,x)
     3. Result Display -->
</head>
<body>

     <script>

           function sub()
        {
            let value1 = f1.value;
            let value2 = f2.value;
            let r = value1-value2;
            result.value = r;
        }

         function mul()
        {
                let value1 = f1.value;
                let value2 = f2.value;
                let r = value1*value2;
                result.value=r;
        }

        function add(){
            let value1 = Number (f1.value);
                let value2 = Number (f2.value);
                let r = value1+value2;
                result.value=r;
        }

        function div(){
                let value1 = f1.value;
                let value2 = f2.value;
                let r = value1/value2;
                result.value=r;
        }
    </script>


</head>
<body>

       
        <div>
             Value 1: <input type="number" id="f1"/>
        Value 2: <input type="number" id="f2"/> <br>

         <div class="but">
        <button class="add" onclick="add ()">+</button>
        <button class="adding" onclick="sub ()">-</button>
        <button class="added" onclick="mul ()">*</button>
        <button class="ads" onclick="div ()">/</button>
        </div>

       <div class="shuku">
         Result: <input class="number" type="number" id="result"/>
       </div>
       
        </div>



       
    

    
</body>
</html>
